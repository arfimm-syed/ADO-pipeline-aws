# ================================
# Azure DevOps Pipeline for AWS Terraform
# ================================



variables:
  - group: var-pipeline   # Variable group containing AWS keys, region, S3 bucket, etc.

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

# -----------------------------
# VALIDATE STAGE
# -----------------------------
stages:
- stage: Validate
  displayName: 'Validation'
  jobs:
  - job: Validate
    displayName: 'Terraform Validation Job'
    steps:
      - checkout: self

      - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
        inputs:
          terraformVersion: '1.6.6'

      - task: Bash@3
        displayName: 'Install Checkov'
        inputs:
          targetType: 'inline'
          script: |
            python3 -m pip install --upgrade pip
            pip3 install checkov

      - task: Bash@3
        displayName: 'Security Scan'
        inputs:
          targetType: 'inline'
          script: |
            checkov -d terraform

# -----------------------------
# PLAN STAGE
# -----------------------------
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Validate
  jobs:
  - job: Plan
    displayName: 'Terraform Plan Job'
    steps:
      - checkout: self

      - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@0
        inputs:
          terraformVersion: '1.6.6'

      - task: AWSCLI@1
        inputs:
          awsCredentials: 'aws-ser-con'
          regionName: 'us-east-1'
          displayName: 'Authenticate to AWS'
          awsCommand: 'sts'
          awsSubCommand: 'get-caller-identity'

      - task: Bash@3
        displayName: 'Set AWS Env & Terraform Init'
        inputs:
          targetType: 'inline'
          script: |
           terraform init \
           -backend-config="bucket=$s3_bucket" \
           -backend-config="key=$tfstate_key" \
           -backend-config="region=$aws_region" \
           -backend-config="dynamodb_table=$dynamodb_table" \
           -backend-config="encrypt=true"

           terraform plan -out=tfplan
        env:
           export AWS_ACCESS_KEY_ID=$AWS_Access_Key_ID
           export AWS_SECRET_ACCESS_KEY=$Secret_Access_Key
           export AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION

          

